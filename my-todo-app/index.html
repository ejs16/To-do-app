<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      color: #1a1a1a;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }

    .input-row input:focus {
      border-color: #6366f1;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4f46e5;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
      font-weight: 600;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 16px;
      transition: opacity 0.2s;
    }

    .task-item.completed {
      opacity: 0.55;
    }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      font-size: 0.95rem;
      padding: 40px 0;
    }

    .summary {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #9ca3af;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('completed', this)">Completed</button>
    </div>

    <div class="task-list" id="task-list"></div>
    <div class="summary" id="summary"></div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('task-list');
      const summary = document.getElementById('summary');

      const visible = tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'completed') return t.done;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = '<div class="empty-state">No tasks here.</div>';
      } else {
        list.innerHTML = visible.map(t => `
          <div class="task-item ${t.done ? 'completed' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}')" />
            <span class="task-text">${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove('${t.id}')" title="Delete">&#x2715;</button>
          </div>
        `).join('');
      }

      const remaining = tasks.filter(t => !t.done).length;
      summary.textContent = tasks.length
        ? `${remaining} of ${tasks.length} task${tasks.length !== 1 ? 's' : ''} remaining`
        : '';
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ id: crypto.randomUUID(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const task = tasks.find(t => t.id === id);
      if (task) task.done = !task.done;
      save();
      render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Submit on Enter
    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
