<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do It.</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #d4f244;
      --accent-dim: #b8d93a;
      --text: #f0f0f0;
      --muted: #555;
      --done: #2e2e2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px 100px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    header {
      margin-bottom: 48px;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 15vw, 120px);
      line-height: 0.9;
      letter-spacing: 2px;
      color: var(--text);
    }

    .title span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      padding: 16px 20px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 6px;
      width: 52px;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-row button:hover { background: var(--accent-dim); }
    .input-row button:active { transform: scale(0.95); }

    /* Filters */
    .filter-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.6;
    }

    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }

    .filters button {
      background: none;
      border: 1.5px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button:hover { color: var(--text); }

    .filters button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Stats */
    .summary {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .summary strong { color: var(--accent); }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Task item */
    .task-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s, opacity 0.2s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #3a3a3a; }

    .task-item.completed {
      opacity: 0.5;
      background: var(--done);
    }

    /* Checkbox */
    .task-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: none;
      position: relative;
    }

    .task-item input[type="checkbox"]:hover { border-color: var(--accent); }

    .task-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-item input[type="checkbox"]:checked::after {
      content: '';
      display: block;
      width: 10px;
      height: 8px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L3.5 6.5L9 1' stroke='%230e0e0e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-size: contain;
      position: absolute;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      opacity: 0;
      transition: all 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ff5c5c; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1 class="title">Do<span>.</span></h1>
    <p class="subtitle">Get things done — one task at a time</p>
  </header>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="200" autocomplete="off" />
    <button onclick="addTask()">+</button>
  </div>

  <div class="filter-label">Status</div>
  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">All</button>
    <button onclick="setFilter('active', this)">Active</button>
    <button onclick="setFilter('completed', this)">Completed</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="task-list" id="task-list"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function render() {
    const list = document.getElementById('task-list');
    const summary = document.getElementById('summary');

    const visible = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'completed') return t.done;
      return true;
    });

    if (visible.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${filter === 'completed' ? '✓' : '○'}</div>
          <p>${filter === 'completed' ? 'No completed tasks' : filter === 'active' ? 'Nothing active' : 'Add your first task above'}</p>
        </div>`;
    } else {
      list.innerHTML = visible.map(t => `
        <div class="task-item ${t.done ? 'completed' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}')" />
          <span class="task-text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="remove('${t.id}')" title="Delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    const remaining = tasks.filter(t => !t.done).length;
    summary.innerHTML = tasks.length
      ? `<strong>${remaining}</strong> remaining &nbsp;·&nbsp; ${tasks.length - remaining} completed`
      : '';
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;

    tasks.push({ id: crypto.randomUUID(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const task = tasks.find(t => t.id === id);
    if (task) task.done = !task.done;
    save();
    render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
